<!DOCTYPE html>
<html>
<head>
    <title>Редактирование студента</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

<h2 class="mb-4">Редактировать студента</h2>

<form method="POST" enctype="multipart/form-data" class="card p-4 shadow-sm">

    {% csrf_token %}

    <!-- Имя -->
    <div class="mb-3">
        <label>Имя</label>
        <input type="text" name="first_name" value="{{ student.first_name }}" class="form-control">
    </div>

    <!-- Фамилия -->
    <div class="mb-3">
        <label>Фамилия</label>
        <input type="text" name="last_name" value="{{ student.last_name }}" class="form-control">
    </div>

    <!-- Возраст -->
    <div class="mb-3">
        <label>Возраст</label>
        <input type="number" name="age" value="{{ student.age }}" class="form-control">
    </div>

    <!-- Группа (ВАЖНО: dropdown) -->
    <div class="mb-3">
        <label>Группа</label>

        <select name="group" class="form-control">
            {% for group in groups %}
                <option value="{{ group.id }}"
                    {% if student.group.id == group.id %}selected{% endif %}>
                    {{ group.name }}
                </option>
            {% endfor %}
        </select>
    </div>

    <!-- Фото -->
    <div class="mb-3">
        <label>Фото</label>
        <input type="file" name="photo" class="form-control">
    </div>

    <button type="submit" class="btn btn-primary">
        Сохранить
    </button>

    <a href="{% url 'student_list' %}" class="btn btn-secondary">
        Назад
    </a>

</form>

</body>
</html>
