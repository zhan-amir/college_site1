{% load static %}

<!DOCTYPE html>
<html>
<head>
    <title>Список студентов</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <link rel="stylesheet" href="{% static 'css/style.css' %}">
</head>

<body class="container mt-4">

<h1 class="text-center mb-4">Список студентов</h1>

<a href="{% url 'add_student' %}" class="btn btn-success mb-3">Добавить студента</a>

<div class="row">

    {% for student in students %}
    <div class="col-md-4">

        <div class="card mb-4 shadow-sm">

            {% if student.photo %}
                <img src="{{ student.photo.url }}" class="card-img-top">
            {% else %}
                <img src="{% static 'images/default.png' %}" class="card-img-top">
            {% endif %}

            <div class="card-body">

                <h5 class="card-title">
                    {{ student.first_name }} {{ student.last_name }}
                </h5>

                <p class="card-text">
                    Возраст: {{ student.age }}
                </p>

                <p class="card-text">
                    Группа: {{ student.group.name }}
                </p>

                <!-- 🔥 КНОПКИ -->
                <a href="{% url 'edit_student' student.id %}" class="btn btn-warning btn-sm">
                    Редактировать
                </a>

                <a href="{% url 'delete_student' student.id %}" class="btn btn-danger btn-sm"
                   onclick="return confirm('Удалить студента?')">
                    Удалить
                </a>

            </div>

        </div>

    </div>
    {% endfor %}

</div>

</body>
</html>
